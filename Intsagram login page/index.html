

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login - Responsive</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="instagram shadow">
        <div class="insta1">
            <form action="actin-hgp">
                <div class="insta-h1"><h1>Instagram</h1></div>
                
                <div class="insta-input">
                    <input type="text" placeholder="Phone number, Email, Facebook">
                </div>
                
                <div class="insta-input2">
                    <input type="password" placeholder="Password">
                    <div class="icon"><a><i class="fa-solid fa-eye-slash"></i></a></div>
                </div>

                <div class="link-password"><a>Forgot Password?</a></div>
                
                <div class="button"><button type="submit">Log in</button></div>
                
                <div class="main-paart">
                    <div class="hz1"></div>
                    <span>Or</span>
                    <div class="hz2"></div>
                </div>

                <div class="Facebook-logo">
                    <i class="fa-brands fa-facebook"></i> Log with Facebook
                </div> 

                <div class="hz3"></div>
                <div class="end">
                    Don't have an account? <a>Sign up</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
